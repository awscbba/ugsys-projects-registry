name: Security Scan (DAST)

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan"
        required: false
        default: "https://api.cbba.cloud.org.bo/projects"

permissions:
  contents: read
  security-events: write

jobs:
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Fix workspace permissions for ZAP container
        run: chmod a+w .

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://api.cbba.cloud.org.bo/projects' }}
          rules_file_name: ".zap/rules.tsv"
          fail_action: true
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  nuclei-scan:
    name: Nuclei Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Nuclei
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ github.event.inputs.target_url || 'https://api.cbba.cloud.org.bo/projects' }}
          flags: "-severity critical -stats"
          github-report: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on Findings
    runs-on: ubuntu-latest
    needs: [zap-scan, nuclei-scan]
    if: failure()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            🚨 Security scan found critical issues in `ugsys-projects-registry`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
