name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # Requires web/package-lock.json to be committed
          cache-dependency-path: web/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AUTH_API_URL: ${{ secrets.VITE_AUTH_API_URL }}

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://ugsys-frontend-prod/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "assets/*"
          aws s3 sync dist/assets/ s3://ugsys-frontend-prod/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Notify Slack — Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: "✅ Frontend deployed `ugsys-projects-registry` to prod — ${{ github.sha }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack — Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: "❌ Frontend deploy failed for `ugsys-projects-registry` — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
