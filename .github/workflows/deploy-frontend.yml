name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "web/**"

defaults:
  run:
    working-directory: web

jobs:
  deploy:
    name: Build & Deploy to Amplify
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AUTH_API_URL: ${{ secrets.VITE_AUTH_API_URL }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload dist to S3 and start Amplify deployment
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          # Create a deployment in Amplify and get the upload URL
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --output json)

          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')
          ZIP_UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')

          # Zip the dist directory and upload
          cd dist && zip -r ../dist.zip . && cd ..
          curl -X PUT -H "Content-Type: application/zip" \
            --data-binary @dist.zip "$ZIP_UPLOAD_URL"

          # Start the deployment
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-id "$JOB_ID"

          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "C0AE6QV0URH"
          slack-message: |
            :white_check_mark: *Frontend deployed* to Amplify (`main`)
            Commit: `${{ github.sha }}`
            ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "C0AE6QV0URH"
          slack-message: |
            :x: *Frontend deploy failed* on `${{ github.repository }}`
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
