name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: ["*.md", ".gitignore", "web/**"]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 142728997126.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: ugsys-projects-registry

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Lambda (prod)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        id: build
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          IMAGE_TAG="main-$GIT_HASH"
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          LATEST_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          docker build -t $IMAGE_URI -t $LATEST_URI .
          docker push $IMAGE_URI
          docker push $LATEST_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ugsys-projects-registry-prod \
            --image-uri ${{ steps.build.outputs.image_uri }} \
            --region ${{ env.AWS_REGION }}

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ugsys-projects-registry-prod \
            --region ${{ env.AWS_REGION }} \
            --environment "Variables={
              PROJECTS_TABLE_NAME=ugsys-projects-prod,
              SUBSCRIPTIONS_TABLE_NAME=ugsys-subscriptions-prod,
              FORM_SUBMISSIONS_TABLE_NAME=ugsys-form-submissions-prod,
              DYNAMODB_TABLE_PREFIX=ugsys,
              EVENT_BUS_NAME=ugsys-platform-bus,
              ENVIRONMENT=prod,
              APP_ENV=prod,
              S3_IMAGES_BUCKET=ugsys-images-prod,
              LOG_LEVEL=INFO,
              ALLOWED_ORIGINS=https://registry.apps.cloud.org.bo,https://admin.apps.cloud.org.bo,https://auth.apps.cloud.org.bo,https://messaging.apps.cloud.org.bo
            }"

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "C0AE6QV0URH"
          slack-message: |
            :rocket: *Deployed — ugsys-projects-registry (prod)*
            Commit: `${{ github.sha }}` by ${{ github.actor }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "C0AE6QV0URH"
          slack-message: |
            :x: *Deploy FAILED — ugsys-projects-registry (prod)*
            Commit: `${{ github.sha }}` by ${{ github.actor }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
