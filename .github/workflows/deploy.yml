name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: ["*.md", ".gitignore", "web/**"]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 142728997126.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: ugsys-projects-registry

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Lambda (prod)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push container image
        id: build
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          IMAGE_TAG="main-$GIT_HASH"
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          LATEST_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          docker build -t $IMAGE_URI -t $LATEST_URI .
          docker push $IMAGE_URI
          docker push $LATEST_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ugsys-projects-registry-prod \
            --image-uri ${{ steps.build.outputs.image_uri }} \
            --region ${{ env.AWS_REGION }}

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":rocket:",
              "text": "🚀 Deployed — ugsys-projects-registry",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "🚀 Deployed — ugsys-projects-registry (prod)", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Deploy Failed — ugsys-projects-registry",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Deploy Failed — ugsys-projects-registry", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }
